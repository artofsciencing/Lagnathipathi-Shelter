<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Luck Enabler — குருவே சரணம்</title>
<style>
body{font-family:'Noto Sans Tamil',sans-serif;background:#fbf7f0;color:#222;text-align:center;margin:0}
header{background:#933;color:#fff;padding:10px 0}
h1{margin:0;font-size:1.5em}
h2{margin:5px 0 10px;font-weight:400}
section{margin:10px auto;max-width:600px;background:#fff6ee;padding:10px;border-radius:6px}
label{display:block;margin:5px auto}
input,select,button{padding:5px;font-size:1em;border:1px solid #aaa;border-radius:4px}
canvas{border:1px solid #333;background:#fff;margin:15px auto;display:block}
.langBtn{background:#933;color:#fff;border:none;padding:5px 10px;border-radius:5px;cursor:pointer}
#result{max-width:500px;margin:10px auto;background:#fff;border:1px solid #d9b;border-radius:5px;padding:8px}
footer{font-size:.85em;color:#666;margin:25px}
</style>
</head>
<body>
<header>
  <h1 id="title">Luck Enabler — குருவே சரணம்</h1>
  <h2 id="subtitle">South Indian Horoscope & Shelter Finder · தென் இந்திய ஜாதகம் மற்றும் சரண அளிப்பவர் தேடல்</h2>
  <button class="langBtn" onclick="toggleLang()">தமிழ் / English</button>
</header>

<section>
  <label>Date of Birth / பிறந்த தேதி : <input type="date" id="dob"></label>
  <label>Time / நேரம் : <input type="time" id="tob" step="1"></label>
  <label>Place / இடம் : <input id="place" placeholder="City"></label>
  <label>Time Zone / நேர வலயம் : 
    <select id="timezone">
      <option value="">-- Select / தேர்வு --</option>
      <option>Asia/Kolkata</option><option>Asia/Colombo</option>
      <option>Asia/Dubai</option><option>Europe/London</option>
      <option>America/New_York</option><option>Australia/Sydney</option>
    </select>
  </label><br>
  <button onclick="drawChart()">Generate Horoscope / ஜாதகம் உருவாக்கு</button>
</section>

<canvas id="chart" width="480" height="480"></canvas>

<div>
  <button onclick="findShelter()">Find Shelter Provider / சரண அளிப்பவர் கண்டறி</button>
  <button onclick="resetChart()">Reset / மீட்டமை</button>
</div>

<div id="result"></div>
<footer>Luck Enabler © 2024 Standalone Edition</footer>

<script>
let lang="bi";
function toggleLang(){
  if(lang==="bi"){document.getElementById("title").innerText="Luck Enabler";
    document.getElementById("subtitle").innerText="South Indian Horoscope and Shelter Finder";
    lang="en";
  } else {
    document.getElementById("title").innerText="Luck Enabler — குருவே சரணம்";
    document.getElementById("subtitle").innerText="தென் இந்திய ஜாதகம் மற்றும் சரண அளிப்பவர் தேடல்";
    lang="bi";
  }
}

const c=document.getElementById("chart"),ctx=c.getContext("2d");
const size=c.width;let houses={};for(let i=1;i<=12;i++)houses[i]=[];
function drawChart(){
  ctx.clearRect(0,0,size,size);
  ctx.strokeStyle="#222";ctx.lineWidth=1.2;
  const cx=size/2,cy=size/2,r=size/2-25;
  // draw 12 fixed houses
  for(let i=0;i<12;i++){
    const ang=(Math.PI/6)*i;
    const x=cx+r*Math.cos(ang),y=cy+r*Math.sin(ang);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.stroke();
  }
  ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.stroke();
  // mark sign names
  const names=[["Aries","மேஷம்"],["Taurus","ரிஷபம்"],["Gemini","மிதுனம்"],["Cancer","கடகம்"],
  ["Leo","சிம்மம்"],["Virgo","கன்னி"],["Libra","துலாம்"],["Scorpio","விருச்சிகம்"],
  ["Sagittarius","தனுசு"],["Capricorn","மகரம்"],["Aquarius","கும்பம்"],["Pisces","மீனம்"]];
  ctx.font="12px Noto Sans Tamil";ctx.fillStyle="#933";
  for(let i=0;i<12;i++){
    const ang=(Math.PI/6)*(i+0.5);
    const x=cx+(r*0.7)*Math.cos(ang),y=cy+(r*0.7)*Math.sin(ang);
    const t=(lang==="en")?names[i][0]:names[i][1];
    ctx.fillText(t,x-20,y);
  }
}

c.addEventListener("click",e=>{
  const rect=c.getBoundingClientRect();
  const x=e.clientX-rect.left-size/2,y=e.clientY-rect.top-size/2;
  let ang=Math.atan2(y,x);if(ang<0)ang+=2*Math.PI;
  const h=Math.floor(ang/(Math.PI/6))+1;
  const p=prompt("Enter planet for House "+h+" (e.g. Sun)");
  if(p){houses[h].push(p);drawChart();placePlanets();}
});

function placePlanets(){
  const cx=size/2,cy=size/2,r=size/2-40;
  ctx.font="14px Arial";ctx.fillStyle="#111";
  for(let i=1;i<=12;i++){
    if(houses[i].length){
      const ang=(Math.PI/6)*(i-0.5);
      const x=cx+(r*0.5)*Math.cos(ang),y=cy+(r*0.5)*Math.sin(ang);
      ctx.fillText(houses[i].join(','),x-10,y);
    }
  }
}

function resetChart(){for(let i=1;i<=12;i++)houses[i]=[];drawChart();document.getElementById("result").innerHTML='';}

function findShelter(){
  const lag=parseInt(prompt(lang==='en'?"Enter Lagna No (1–12)":"லக்ன எண் (1–12):"));
  if(!lag||lag<1||lag>12)return;
  const map=[
    ["Aries","Mars","முருகன் / Subramanya"],
    ["Taurus","Venus","லக்ஷ்மி"],["Gemini","Mercury","விஷ்ணு"],
    ["Cancer","Moon","பார்வதி"],["Leo","Sun","சிவன்"],
    ["Virgo","Mercury","விஷ்ணு"],["Libra","Venus","லக்ஷ்மி"],
    ["Scorpio","Mars","முருகன் / Subramanya"],["Sagittarius","Jupiter","தக்ஷிணாமூர்த்தி"],
    ["Capricorn","Saturn","அனுமன்"],["Aquarius","Saturn","அனுமன்"],["Pisces","Jupiter","தக்ஷிணாமூர்த்தி"]];
  const m=map[lag-1];
  document.getElementById("result").innerHTML=(lang==="en"
    ?`<h3>Ascendant : ${m[0]}</h3><p><b>Lagna Lord:</b> ${m[1]}</p><p><b>Shelter Provider (Deity):</b> ${m[2]}</p>`
    :`<h3>லக்னம் : ${m[0]}</h3><p><b>லக்ன அதிபதி :</b> ${m[1]}</p><p><b>சரண அளிப்பவர் (தெய்வம்):</b> ${m[2]}</p>`);
}

// draw initial empty chart
drawChart();
</script>
</body>
</html>
